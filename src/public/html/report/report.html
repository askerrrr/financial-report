<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/report.css" type="text/css" />
    <link rel="icon" href="../../image/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/css/modalWindow.css" type="text/css" />
    <title>Report</title>
  </head>
  <body id="report-body">
    <button id="download-report-as-xlsx-button">Скачать отчет как эксель</button>
    <button id="delete-report-button">Удалить отчет</button>
    <form action="/"><button id="url-to-main">На главную</button></form>
    <table id="skus-table">
      <thead>
        <tr>
          <th>Фото</th>
          <th>Артикул</th>
          <th>Кол-во</th>
          <th>Возвраты</th>
          <th>Себестоимость в р.</th>
          <th>Средняя розничная цена</th>
          <th>Доставка</th>
          <th>Удержания/Выплаты</th>
          <th>Хранение</th>
          <th>Приемка</th>
          <th>Выплата с вычетом всех услуг WB</th>
          <th>Средняя прибыль с вычетом всех услуг WB на 1 ед.</th>
          <th>Чистая прибыль в %</th>
          <th>Итого в р.</th>
        </tr>
      </thead>
      <tbody id="skus-tbody"></tbody>
    </table>
    <script src="/js/report/index.js" type="module"></script>
  </body>
</html>
